<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Versecue Admin</title>
<style>
  :root {
    --bg: #0b0b10; --panel: #16161f; --panel-2: #1e1e2a; --text: #e9e9f2;
    --dim: #8a8aa5; --faint: #3c3c52; --accent: #ff4d8d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, sans-serif;
    max-width: 640px; margin: 0 auto; padding: 20px 16px 60px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: var(--dim); font-size: 13px; margin-bottom: 20px; }
  #gate { display: flex; gap: 8px; margin-bottom: 20px; }
  #pw {
    flex: 1; background: var(--panel); border: 1px solid var(--faint); border-radius: 10px;
    color: var(--text); font-size: 15px; padding: 10px 12px; outline: none;
  }
  #pw:focus { border-color: var(--accent); }
  button {
    font-family: inherit; border: none; border-radius: 10px; cursor: pointer;
    padding: 10px 16px; font-size: 14px; font-weight: 600;
  }
  #unlock { background: var(--accent); color: #fff; }
  #gate-status { color: var(--accent); font-size: 13px; margin-bottom: 16px; min-height: 18px; }
  #panel.hidden, #gate.hidden { display: none; }
  .row {
    background: var(--panel); border-radius: 12px; padding: 12px 14px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .row-del {
    background: var(--panel-2); color: var(--dim); flex-shrink: 0; padding: 8px 12px;
  }
  .row-del:active { color: #fff; background: var(--accent); }
  .empty { color: var(--dim); text-align: center; padding: 40px 20px; }
  #refresh { background: var(--panel); color: var(--dim); margin-bottom: 14px; }
</style>
</head>
<body>

<h1>Versecue Admin</h1>
<div class="sub">Delete records from Public List</div>

<div id="gate">
  <input id="pw" type="password" placeholder="Admin password" autocomplete="off">
  <button id="unlock">Unlock</button>
</div>
<div id="gate-status"></div>

<div id="panel" class="hidden">
  <button id="refresh">↻ Refresh</button>
  <div id="list"></div>
</div>

<script>
const API_ORIGIN = 'https://versecue-share.pages.dev';
let adminPassword = null;

const $ = id => document.getElementById(id);

async function unlock() {
  const pw = $('pw').value;
  $('gate-status').textContent = 'Checking…';
  try {
    const res = await fetch(`${API_ORIGIN}/api/admin/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (data.ok) {
      adminPassword = pw;
      $('gate').classList.add('hidden');
      $('gate-status').textContent = '';
      $('panel').classList.remove('hidden');
      loadList();
    } else {
      $('gate-status').textContent = 'Wrong password.';
    }
  } catch {
    $('gate-status').textContent = 'Could not reach the server — check your connection.';
  }
}

async function loadList() {
  $('list').innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res = await fetch(`${API_ORIGIN}/api/publish-index`, { cache: 'no-store' });
    const idx = res.ok ? await res.json() : [];
    idx.sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));
    renderList(idx);
  } catch {
    $('list').innerHTML = '<div class="empty">Could not load the list.</div>';
  }
}

function renderList(idx) {
  const wrap = $('list');
  wrap.innerHTML = '';
  if (!idx.length) {
    wrap.innerHTML = '<div class="empty">No songs published yet.</div>';
    return;
  }
  for (const e of idx) {
    const row = document.createElement('div');
    row.className = 'row';

    const main = document.createElement('div');
    main.className = 'row-main';
    const t = document.createElement('div');
    t.className = 'row-title';
    t.textContent = e.title;
    const sub = document.createElement('div');
    sub.className = 'row-sub';
    const date = e.publishedAt ? new Date(e.publishedAt).toLocaleDateString() : 'unknown date';
    sub.textContent = `${e.artist || 'no artist'} · ${e.views || 0} plays · ${date} · ${e.id}`;
    main.append(t, sub);

    const bDel = document.createElement('button');
    bDel.className = 'row-del';
    bDel.textContent = 'Delete';
    bDel.onclick = () => deleteEntry(e.id, e.title);

    row.append(main, bDel);
    wrap.appendChild(row);
  }
}

async function deleteEntry(id, title) {
  if (!confirm(`Permanently delete "${title}" from Public List?`)) return;
  try {
    const res = await fetch(`${API_ORIGIN}/api/publish/${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: { 'X-Admin-Password': adminPassword },
    });
    if (!res.ok) throw new Error('failed');
    loadList();
  } catch {
    alert('Could not delete — check your connection and try again.');
  }
}

$('unlock').onclick = unlock;
$('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
$('refresh').onclick = loadList;
</script>
</body>
</html>
